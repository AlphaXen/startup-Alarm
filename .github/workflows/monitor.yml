name: K-Startup 공고 모니터링

on:
  schedule:
    # 20분마다 실행 (낮/밤 시간대 구분은 checker.py 내부에서 처리)
    - cron: '*/20 * * * *'

  # Actions 탭에서 수동 실행 버튼 활성화
  workflow_dispatch:

# 저장소에 커밋을 푸시하기 위한 권한
permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      # 1. 저장소 코드 체크아웃
      - name: 저장소 체크아웃
        uses: actions/checkout@v4
        with:
          # seen_ids.json 커밋을 위해 토큰 명시
          token: ${{ secrets.GITHUB_TOKEN }}

      # 2. Python 설치
      - name: Python 3.11 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # 3. Chrome 설치 (Selenium fallback용)
      - name: Chrome 설치
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      # 4. 패키지 설치
      - name: 패키지 설치
        run: pip install -r requirements.txt

      # 5. 모니터링 실행
      - name: 모니터링 실행
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python checker.py

      # 5. seen_ids.json 변경 시 자동 커밋 (상태 영구 보존 핵심!)
      - name: seen_ids.json 커밋 및 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_ids.json
          # 변경사항이 있을 때만 커밋 (없으면 스킵)
          git diff --staged --quiet || git commit -m "chore: seen_ids 업데이트 [skip ci]"
          git push
